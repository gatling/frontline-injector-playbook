name: Azure x86 Graal latest
on:
  workflow_dispatch:
    inputs:
      image_version:
        description: 'Image version (x.x.x)'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6


      - name: Setup Packer
        uses: hashicorp-contrib/setup-packer@v1
        with:
          packer-version: '1.11.2'

      - name: Init Packer
        run: cd packer; packer init azure-x86-graal.pkr.hcl

        # run: packer plugins install github.com/hashicorp/azure && packer plugins install github.com/hashicorp/ansible

      - name: Build image from template
        env:
          CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          IMAGE_VERSION: ${{ github.event.inputs.image_version }}
        run: |
          ./build-azure-x86-graal.sh \
            --java-major 25 \
            --graalvm-version 25.0.2 \
            --client-id "$CLIENT_ID" \
            --client-secret "$CLIENT_SECRET" \
            --subscription-id "$SUBSCRIPTION_ID" \
            --tenant-id "$TENANT_ID" \
            --image-version "$IMAGE_VERSION"
