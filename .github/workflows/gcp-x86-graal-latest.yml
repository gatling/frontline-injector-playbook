name: GCP x86 graalvm latest
on:
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Packer
        uses: hashicorp-contrib/setup-packer@v3
        with:
            packer-version: '1.11.2'


      - name: Build image from template
        run: cd packer; packer init gcp-x86-graal.pkr.hcl


      - name: Configure GCP Credentials
        run: |
          echo "$ENV_FILE" > creds.json;
        shell: bash
        env: 
          ENV_FILE: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }} 

      - name: Build image from template
        env:
          GOOGLE_APPLICATION_CREDENTIALS: "./creds.json"
          GOOGLE_PROJECT_ID: ${{ secrets.GOOGLE_PROJECT_ID }}
        run: |
          ./build-gcp-x86-graal.sh --java-major 25  --graalvm-version 25.0.2  --project-id "$GOOGLE_PROJECT_ID"  --latest true
